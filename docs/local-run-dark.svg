<svg xmlns="http://www.w3.org/2000/svg" width="700" height="310" viewBox="0 0 700 310">
  <!-- window chrome -->
  <rect width="700" height="310" rx="10" fill="#0d1017"/>
  <rect width="700" height="310" rx="10" fill="none" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- titlebar -->
  <rect width="700" height="36" rx="10" fill="#131720"/>
  <rect y="26" width="700" height="10" fill="#131720"/>
  <rect y="36" width="700" height="1" fill="#1a1f2e"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- terminal title -->
  <text x="350" y="23" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278" text-anchor="middle">bash — urban dynamics simulator</text>

  <!-- line 1: prompt + command -->
  <text x="20" y="62" font-family="'DM Mono','Courier New',monospace" font-size="12" fill="#2dffaa">➜</text>
  <text x="38" y="62" font-family="'DM Mono','Courier New',monospace" font-size="12" fill="#4f9eff">urban-dynamics-simulator</text>
  <text x="232" y="62" font-family="'DM Mono','Courier New',monospace" font-size="12" fill="#dde2f0"> npm run dev</text>

  <!-- separator -->
  <line x1="20" y1="72" x2="680" y2="72" stroke="#1a1f2e" stroke-width="1"/>

  <!-- output lines -->
  <text x="20" y="92" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">&gt; urban3d-simulator@1.0.0 dev</text>
  <text x="20" y="110" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">&gt; npx http-server . -p 3001 -o index.html --cors</text>

  <text x="20" y="134" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#dde2f0">Starting up http-server, serving .</text>
  <text x="20" y="152" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">http-server version: 14.1.1</text>

  <!-- settings block -->
  <text x="20" y="174" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">CORS: </text>
  <text x="62" y="174" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#2dffaa">true</text>
  <text x="300" y="174" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">Cache: </text>
  <text x="345" y="174" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#ffb340">3600 seconds</text>

  <!-- available on -->
  <text x="20" y="200" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#dde2f0">Available on:</text>
  <text x="20" y="218" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">  http://</text>
  <text x="68" y="218" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#4f9eff">192.168.0.240:3001</text>
  <text x="20" y="236" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">  http://</text>
  <text x="68" y="236" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#4f9eff">127.0.0.1:3001</text>
  <text x="20" y="254" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">Hit </text>
  <text x="42" y="254" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#ff4f6a">CTRL-C</text>
  <text x="92" y="254" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278"> to stop the server</text>

  <!-- open line -->
  <text x="20" y="274" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5a6278">Open: </text>
  <text x="62" y="274" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#2dffaa">http://127.0.0.1:3001/index.html</text>

  <!-- cursor blink indicator -->
  <rect x="20" y="286" width="8" height="13" fill="#4f9eff" opacity="0.8" rx="1"/>
</svg>
